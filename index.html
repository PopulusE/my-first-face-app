<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>本地人脸追踪</title>
    <script src="face-api.min.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; }
        #container { position: relative; display: inline-block; }
        canvas { position: absolute; top: 0; left: 0; }
        video { border-radius: 10px; background: #333; }
    </style>
</head>
<body>
    <h2>本地 AI 人脸追踪 (离线可用)</h2>
    <div id="status">正在加载本地模型...</div>
    
    <div id="container">
        <video id="video" width="640" height="480" autoplay muted></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const status = document.getElementById('status');

        async function init() {
            try {
                // 2. 加载本地 models 文件夹中的模型
                await faceapi.nets.tinyFaceDetector.loadFromUri('./models');
                status.innerText = "模型就绪，请开启摄像头权限";

                const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = stream;
            } catch (err) {
                status.innerText = "错误: " + err.message;
                console.error(err);
            }
        }

        video.addEventListener('play', () => {
            const canvas = faceapi.createCanvasFromMedia(video);
            document.getElementById('container').append(canvas);
            const displaySize = { width: video.width, height: video.height };
            faceapi.matchDimensions(canvas, displaySize);

            setInterval(async () => {
                const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions());
                const resizedDetections = faceapi.resizeResults(detections, displaySize);
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                faceapi.draw.drawDetections(canvas, resizedDetections);
            }, 100);
            status.innerText = "追踪中...";
        });

        init();
    </script>
</body>
</html>
